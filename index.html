<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commit Tracker</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <div>
        <h1 id="headline">Loading commits...</h1>
        <p class="sub" id="subline">Waiting for the machinery to do its thing.</p>
      </div>
      <div class="live-pill" id="live-pill">LIVE</div>
    </header>

    <section class="panel">
      <div class="chart-wrap">
        <div id="chart" class="chart"></div>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Tracked commits</div>
          <div class="stat-value" id="stat-total-commits">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Repositories</div>
          <div class="stat-value" id="stat-total-repos">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Contributors</div>
          <div class="stat-value" id="stat-total-authors">0</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="section-header filters-header">
        <h2>Filters</h2>
        <div class="actions-row">
          <button id="refresh-btn" type="button">Refresh</button>
          <button id="clear-filters-btn" type="button" class="secondary-btn">Clear filters</button>
        </div>
      </div>

      <div class="filters-grid">
        <label class="filter-field">
          <span>Repository</span>
          <select id="repo-filter">
            <option value="">All repositories</option>
          </select>
        </label>

        <label class="filter-field">
          <span>Branch</span>
          <select id="branch-filter">
            <option value="">All branches</option>
          </select>
        </label>

        <label class="filter-field">
          <span>Organization / person</span>
          <select id="owner-filter">
            <option value="">All owners</option>
          </select>
        </label>

        <label class="filter-field">
          <span>Contributor</span>
          <select id="contributor-filter">
            <option value="">All contributors</option>
          </select>
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="section-header">
        <h2>Recent commits</h2>
        <div id="pagination-summary" class="pagination-summary">Page 1</div>
      </div>
      <div id="feed" class="feed"></div>

      <div class="pagination-bar">
        <button id="prev-page-btn" type="button">Previous</button>
        <div id="page-indicator" class="page-indicator">Page 1 of 1</div>
        <button id="next-page-btn" type="button">Next</button>
      </div>
    </section>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
